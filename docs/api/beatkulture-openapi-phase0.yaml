openapi: 3.0.3
info:
  title: Beatkulture AI Event Host API
  version: 0.1.0
  description: Phase 0 REST contract foundation for Beatkulture platform services.
servers:
  - url: /api/v1
tags:
  - name: Auth
  - name: Clients
  - name: Events
  - name: Timelines
  - name: AI
  - name: Voice
  - name: Avatar
  - name: Visualization
  - name: Rehearsal
  - name: Approvals
paths:
  /auth/me:
    get:
      tags: [Auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Authenticated user profile
  /clients:
    get:
      tags: [Clients]
      summary: List clients available to current user
      responses:
        "200":
          description: Client list
    post:
      tags: [Clients]
      summary: Create client
      responses:
        "201":
          description: Client created
  /clients/{clientId}:
    get:
      tags: [Clients]
      summary: Get a client
      parameters:
        - $ref: "#/components/parameters/ClientId"
      responses:
        "200":
          description: Client record
    patch:
      tags: [Clients]
      summary: Update client
      parameters:
        - $ref: "#/components/parameters/ClientId"
      responses:
        "200":
          description: Updated client
  /events:
    get:
      tags: [Events]
      summary: List events
      responses:
        "200":
          description: Event list
    post:
      tags: [Events]
      summary: Create event
      responses:
        "201":
          description: Event created
  /events/{eventId}:
    get:
      tags: [Events]
      summary: Get event
      parameters:
        - $ref: "#/components/parameters/EventId"
      responses:
        "200":
          description: Event detail
    patch:
      tags: [Events]
      summary: Update event
      parameters:
        - $ref: "#/components/parameters/EventId"
      responses:
        "200":
          description: Updated event
  /events/{eventId}/timelines/generate:
    post:
      tags: [Timelines]
      summary: Generate timeline draft for event
      parameters:
        - $ref: "#/components/parameters/EventId"
      responses:
        "202":
          description: Generation job accepted
  /events/{eventId}/timelines:
    get:
      tags: [Timelines]
      summary: List event timelines
      parameters:
        - $ref: "#/components/parameters/EventId"
      responses:
        "200":
          description: Timeline versions
  /events/{eventId}/ai/conversations:
    post:
      tags: [AI]
      summary: Start AI planning conversation
      parameters:
        - $ref: "#/components/parameters/EventId"
      responses:
        "201":
          description: Conversation created
  /ai/conversations/{conversationId}/messages:
    post:
      tags: [AI]
      summary: Send message in AI conversation
      parameters:
        - $ref: "#/components/parameters/ConversationId"
      responses:
        "200":
          description: Assistant response and updated context
  /voice/stt:
    post:
      tags: [Voice]
      summary: Speech-to-text transcription
      responses:
        "200":
          description: Transcript generated
  /voice/tts:
    post:
      tags: [Voice]
      summary: Text-to-speech synthesis
      responses:
        "200":
          description: Audio generated
  /events/{eventId}/avatar-settings:
    get:
      tags: [Avatar]
      summary: Get avatar settings for event
      parameters:
        - $ref: "#/components/parameters/EventId"
      responses:
        "200":
          description: Avatar settings
    patch:
      tags: [Avatar]
      summary: Update avatar settings for event
      parameters:
        - $ref: "#/components/parameters/EventId"
      responses:
        "200":
          description: Updated avatar settings
  /events/{eventId}/scenes/generate:
    post:
      tags: [Visualization]
      summary: Generate visualization scene set
      parameters:
        - $ref: "#/components/parameters/EventId"
      responses:
        "202":
          description: Generation accepted
  /events/{eventId}/rehearsal/render:
    post:
      tags: [Rehearsal]
      summary: Create rehearsal video render job
      parameters:
        - $ref: "#/components/parameters/EventId"
      responses:
        "202":
          description: Render job accepted
  /events/{eventId}/approvals:
    post:
      tags: [Approvals]
      summary: Create approval request item
      parameters:
        - $ref: "#/components/parameters/EventId"
      responses:
        "201":
          description: Approval request created
components:
  parameters:
    ClientId:
      name: clientId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EventId:
      name: eventId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ConversationId:
      name: conversationId
      in: path
      required: true
      schema:
        type: string
        format: uuid
