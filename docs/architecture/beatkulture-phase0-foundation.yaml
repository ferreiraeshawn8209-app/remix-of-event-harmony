project:
  name: Beatkulture AI Event Host Platform
  phase: 0
  objective: Foundation architecture and contracts before feature implementation
stack:
  frontend:
    - Next.js
    - React
    - TypeScript
  backend:
    - Node.js
    - Express
  data:
    - PostgreSQL
    - Supabase Auth
    - Supabase Storage
  ai:
    - Ollama-compatible local LLM
    - Faster-Whisper
    - Piper TTS
  realtime_avatar:
    - VRM
    - Three.js
  rendering:
    - FFmpeg
  jobs:
    - Redis
    - BullMQ
services:
  - api-gateway
  - event-engine
  - ai-orchestrator
  - voice-service
  - avatar-service
  - visualization-service
  - video-renderer
  - approval-service
  - notification-service
modules:
  - authentication
  - client-management
  - event-management
  - timeline-generation
  - ai-conversations
  - voice-processing
  - avatar-control
  - event-visualization
  - video-generation
  - approval-workflow
  - documents
  - notifications
brand:
  colors:
    - gold
    - neon-purple
    - neon-orange
roadmap:
  - phase: 1
    name: ai-event-planner
  - phase: 2
    name: voice-ai
  - phase: 3
    name: ai-avatar-concierge
  - phase: 4
    name: event-timeline-engine
  - phase: 5
    name: event-visualization
  - phase: 6
    name: virtual-event-rehearsal
  - phase: 7
    name: client-review-portal
  - phase: 8
    name: ai-virtual-event-host
